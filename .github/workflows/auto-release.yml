name: Auto Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get current version
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Current version: $VERSION"

      - name: Check if tag exists
        id: check
        run: |
          VERSION=${{ steps.pkg.outputs.version }}
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION already exists, skipping"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Tag v$VERSION does not exist, will build and release"
          fi

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: List dist
        run: ls dist/
      - uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: |
            dist/Automated Setup *.exe
            dist/*.exe.blockmap
            dist/latest.yml

  build-mac:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: List dist
        run: ls dist/
      - uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: |
            dist/Automated-*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml

  release:
    needs: [check-version, build-windows, build-mac]
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts

      - uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts

      - name: List all artifacts
        run: find artifacts -type f | head -30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: "Auto-release v${{ needs.check-version.outputs.version }}"
          files: artifacts/**/*
